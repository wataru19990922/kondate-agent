name: Terraform Plan

on:
  pull_request:
    branches: [main]
    paths:
      - "infra/live/**"
      - ".github/workflows/terraform-*.yml"

permissions:
  contents: read
  id-token: write    # WIF (OIDC トークン取得) に必要
  pull-requests: write # plan 結果をコメントするために必要

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_VAR_personal_account_email: ${{ vars.PERSONAL_ACCOUNT_EMAIL }}

jobs:
  plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/live
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_TERRAFORM_SERVICE_ACCOUNT }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.2

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}"

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        id: plan
        run: |
          set +e
          terraform plan -no-color -out=tfplan 2> plan.stderr
          echo "exitcode=$?" >> "$GITHUB_OUTPUT"
          terraform show -no-color tfplan > plan.txt 2>&1
          set -e

      - name: Post plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/live/plan.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.slice(0, 60000) + "\n... (truncated)" : plan;
            const body = "### Terraform Plan\n\n```hcl\n" + truncated + "\n```";
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail if plan errored
        if: steps.plan.outputs.exitcode != '0'
        run: |
          echo "terraform plan failed:"
          cat plan.stderr
          exit 1
